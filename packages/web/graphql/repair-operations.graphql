query Appointments {
    appointments {
        items {
            id
            customerName
            customerPhone
            customerEmail
            vehicleMake
            vehicleModel
            vehicleYear
            vehiclePlate
            serviceType
            description
            scheduledDate
            startTime
            endTime
            status
            assignedMechanic
            bay
            notes
            shopId
        }
        total
    }
}

query Customers {
    customers {
        items {
            id
            name
            email
            phone
            address
            city
            state
            zip
            notes
            totalVehicles
            totalVisits
            totalSpent
            lastVisit
            status
            createdAt
            updatedAt
        }
        total
    }
}

mutation CreateCustomer($input: CreateCustomerInput!) {
    createCustomer(input: $input) {
        id
        name
        email
        phone
        status
    }
}

mutation UpdateCustomer($id: ID!, $input: UpdateCustomerInput!) {
    updateCustomer(id: $id, input: $input) {
        id
        name
        email
        phone
        status
    }
}

mutation DeleteCustomer($id: ID!) {
    deleteCustomer(id: $id)
}

query Vehicles {
    vehicles {
        items {
            id
            make
            model
            year
            vin
            licensePlate
            color
            customerId
            notes
            status
            repairStatus
        }
        total
    }
}

query Vehicle($id: ID!) {
    vehicle(id: $id) {
        id
        tenantId
        customerId
        make
        model
        year
        vin
        licensePlate
        color
        notes
        status
        repairStatus
        createdAt
        updatedAt
    }
}

