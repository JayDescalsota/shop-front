mutation ReassignStaffAssignment($id: ID!, $targetAppointmentId: ID!) {
    reassignStaffAssignment(id: $id, targetAppointmentId: $targetAppointmentId) {
        id
        appointmentId
        status
    }
}

mutation StartStaffAssignment($id: ID!) {
    startStaffAssignment(id: $id) {
        id
        status
        startedAt
