type Customer {
    id: ID!
    tenantId: ID!
    name: String!
    email: String
    phone: String
    address: String
    city: String
    state: String
    zip: String
    notes: String
    totalVehicles: Int!
    totalVisits: Int!
    totalSpent: Float!
    lastVisit: String
    status: String!
    createdAt: String!
    updatedAt: String!
}

type CustomerConnection {
    items: [Customer!]!
    total: Int!
}

input CreateCustomerInput {
    tenantId: ID!
    name: String!
    email: String
    phone: String
    address: String
    city: String
    state: String
    zip: String
    notes: String
}

input UpdateCustomerInput {
    name: String
    email: String
    phone: String
    address: String
    city: String
    state: String
    zip: String
    notes: String
    status: String
}

type Vehicle {
    id: ID!
    tenantId: ID!
    customerId: ID
    make: String!
    model: String!
    year: Int
    vin: String
    licensePlate: String
    color: String
    notes: String
    createdAt: String!
    updatedAt: String!
}

type VehicleConnection {
    items: [Vehicle!]!
    total: Int!
}

input CreateVehicleInput {
    tenantId: ID!
    customerId: ID
    make: String!
    model: String!
    year: Int
    vin: String
    licensePlate: String
    color: String
    notes: String
}

input UpdateVehicleInput {
    make: String
    model: String
    year: Int
    vin: String
    licensePlate: String
    color: String
    notes: String
}

type Query {
    customer(id: ID!): Customer
    customers(tenantId: ID!): CustomerConnection!
    vehicle(id: ID!): Vehicle
    vehicles(tenantId: ID!): VehicleConnection!
    appointment(id: ID!): Appointment
    appointments(tenantId: ID!): AppointmentConnection!
}

type Mutation {
    createCustomer(input: CreateCustomerInput!): Customer!
    updateCustomer(id: ID!, input: UpdateCustomerInput!): Customer!
    deleteCustomer(id: ID!): Boolean!
    createVehicle(input: CreateVehicleInput!): Vehicle!
    updateVehicle(id: ID!, input: UpdateVehicleInput!): Vehicle!
    deleteVehicle(id: ID!): Boolean!
    createAppointment(input: CreateAppointmentInput!): Appointment!
    updateAppointmentStatus(id: ID!, status: String!): Appointment!
    deleteAppointment(id: ID!): Boolean!
}

input CreateAppointmentInput {
    tenantId: ID!
    customerName: String!
    customerPhone: String
    customerEmail: String
    vehicleMake: String!
    vehicleModel: String!
    vehicleYear: Int
    vehiclePlate: String
    serviceType: String!
    description: String
    scheduledDate: String!
    startTime: String!
    endTime: String!
    assignedMechanic: String
    notes: String
}

type Appointment {
    id: ID!
    tenantId: ID!
    customerName: String!
    customerPhone: String
    customerEmail: String
    vehicleMake: String!
    vehicleModel: String!
    vehicleYear: Int
    vehiclePlate: String
    serviceType: String!
    description: String
    status: String!
    scheduledDate: String!
    startTime: String!
    endTime: String!
    assignedMechanic: String
    notes: String
    createdAt: String!
    updatedAt: String!
}

type AppointmentConnection {
    items: [Appointment!]!
    total: Int!
}
